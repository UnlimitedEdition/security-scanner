# Scanner Configuration: Standard (Default)
#
# The default profile. Balanced security posture that scores projects
# fairly without being punitive. This profile is regression-locked to
# V3 scoring behavior — changing it requires updating test_strictness.py.
#
# Best for: general-purpose website security assessment.
#
# Apply with: --strictness standard (or omit — this is the default)
# Or via API: {"strictness": "standard"}

profile: standard

# Scoring weights (points deducted per failed check)
weights:
  CRITICAL: 20
  HIGH: 10
  MEDIUM: 5
  LOW: 2

# Diminishing returns — prevents score collapse from many findings
# in the same severity tier.
diminishing: true
diminishing_caps:
  CRITICAL: 3   # Max 3 × 20 = 60 points from CRITICAL alone
  HIGH: 4       # Max 4 × 10 = 40 points from HIGH alone
  MEDIUM: 4     # Max 4 × 5  = 20 points from MEDIUM alone
  LOW: 5        # Max 5 × 2  = 10 points from LOW alone

# Bonus points for passing INFO-level checks
bonus_per_info: 2
bonus_cap: 20

# Categories excluded from scoring
excluded_categories:
  - SEO
  - GDPR
  - Accessibility
  - Performance

# Grade thresholds
grade_thresholds:
  A: 90   # Excellent — well-hardened site
  B: 75   # Good — minor issues, reasonable posture
  C: 60   # Fair — notable gaps, should address
  D: 40   # Poor — significant vulnerabilities
  # Below 40 = Grade F (Critical)
