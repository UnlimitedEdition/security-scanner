<svg width="32" height="32" viewBox="-20 -20 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Animated colored glow behind shield (5px visible halo) -->
  <path d="M90 10 L150 35 V85 C150 125 120 155 90 170 C60 155 30 125 30 85 V35 Z"
        filter="url(#glow)"
        stroke-width="10"
        opacity="1">
    <animate attributeName="fill"
             values="#22c55e;#eab308;#f97316;#ef4444;#22c55e"
             dur="10s"
             calcMode="discrete"
             repeatCount="indefinite"/>
    <animate attributeName="stroke"
             values="#22c55e;#eab308;#f97316;#ef4444;#22c55e"
             dur="10s"
             calcMode="discrete"
             repeatCount="indefinite"/>
  </path>

  <!-- Shield -->
  <path d="M90 10 L150 35 V85 C150 125 120 155 90 170 C60 155 30 125 30 85 V35 Z"
        fill="url(#shieldGradient)"
        stroke="#e2e8f0"
        stroke-width="2"/>

  <!-- Scan grid -->
  <g stroke="#e2e8f0" stroke-opacity="0.25">
    <line x1="60" y1="60" x2="120" y2="60"/>
    <line x1="60" y1="80" x2="120" y2="80"/>
    <line x1="60" y1="100" x2="120" y2="100"/>
    <line x1="70" y1="50" x2="70" y2="120"/>
    <line x1="90" y1="50" x2="90" y2="120"/>
    <line x1="110" y1="50" x2="110" y2="120"/>
  </g>

  <!-- URL text -->
  <text x="90" y="97"
        text-anchor="middle"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="28"
        font-weight="900"
        letter-spacing="1"
        fill="#ffffff">URL</text>

  <!-- Scan line — color syncs with glow (green → yellow → orange → red) -->
  <rect x="55" y="75" width="70" height="4" opacity="0.9">
    <animate attributeName="y"
             values="60;110;60"
             dur="2.5s"
             repeatCount="indefinite"/>
    <animate attributeName="fill"
             values="#22c55e;#eab308;#f97316;#ef4444;#22c55e"
             dur="10s"
             calcMode="discrete"
             repeatCount="indefinite"/>
  </rect>

</svg>
