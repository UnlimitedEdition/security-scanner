<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>

  <!-- Shield -->
  <path d="M90 10 L150 35 V85 C150 125 120 155 90 170 C60 155 30 125 30 85 V35 Z"
        fill="url(#shieldGradient)"
        stroke="#e2e8f0"
        stroke-width="2"/>

  <!-- Scan grid -->
  <g stroke="#e2e8f0" stroke-opacity="0.25">
    <line x1="60" y1="60" x2="120" y2="60"/>
    <line x1="60" y1="80" x2="120" y2="80"/>
    <line x1="60" y1="100" x2="120" y2="100"/>
    <line x1="70" y1="50" x2="70" y2="120"/>
    <line x1="90" y1="50" x2="90" y2="120"/>
    <line x1="110" y1="50" x2="110" y2="120"/>
  </g>

  <!-- Scan line -->
  <rect x="55" y="75" width="70" height="4" fill="#22c55e">
    <animate attributeName="y" values="60;110;60" dur="2.5s" repeatCount="indefinite"/>
  </rect>

</svg>
